name: Validate Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['7.4', '8.0', '8.2']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: php-parallel-lint

      - name: PHP Lint
        run: parallel-lint --exclude vendor --exclude node_modules .

  validate-structure:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          ERRORS=0
          for FILE in \
            firefighter-stats.php \
            uninstall.php \
            readme.txt \
            readme-pl_PL.txt \
            blocks/emergency-list-widget/block.json \
            languages/firefighter-stats.pot; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Required file missing: $FILE"
              ERRORS=1
            fi
          done

          if [ "$ERRORS" -eq 1 ]; then
            exit 1
          fi

          echo "All required files present."

      - name: Verify version consistency
        run: |
          HEADER_VERSION=$(grep -Po '^\s*\*\s*Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' firefighter-stats.php)
          CONST_VERSION=$(grep -Po "define\(\s*'FIREFIGHTER_STATS_VERSION'\s*,\s*'\K[0-9]+\.[0-9]+\.[0-9]+" firefighter-stats.php)
          STABLE_TAG=$(grep -Po '^Stable tag:\s*\K[0-9]+\.[0-9]+\.[0-9]+' readme.txt)
          BLOCK_VERSION=$(grep -Po '"version"\s*:\s*"\K[0-9]+\.[0-9]+\.[0-9]+' blocks/emergency-list-widget/block.json)
          STABLE_TAG_PL=$(grep -Po '^Stable tag:\s*\K[0-9]+\.[0-9]+\.[0-9]+' readme-pl_PL.txt)

          echo "Plugin header version: $HEADER_VERSION"
          echo "PHP constant version:  $CONST_VERSION"
          echo "readme.txt Stable tag: $STABLE_TAG"
          echo "readme-pl_PL.txt tag:  $STABLE_TAG_PL"
          echo "block.json version:    $BLOCK_VERSION"

          ERRORS=0
          REFERENCE="$HEADER_VERSION"

          for FILE_VERSION in \
            "firefighter-stats.php constant:$CONST_VERSION" \
            "readme.txt Stable tag:$STABLE_TAG" \
            "readme-pl_PL.txt Stable tag:$STABLE_TAG_PL" \
            "block.json version:$BLOCK_VERSION"; do
            LABEL="${FILE_VERSION%%:*}"
            VALUE="${FILE_VERSION##*:}"
            if [ "$VALUE" != "$REFERENCE" ]; then
              echo "::error::Version mismatch — $LABEL is '$VALUE', expected '$REFERENCE' (from plugin header)"
              ERRORS=1
            fi
          done

          if [ "$ERRORS" -eq 1 ]; then
            exit 1
          fi

          echo "All versions consistent: $REFERENCE"
