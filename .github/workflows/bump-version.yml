name: Bump Plugin Version

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version (e.g. 1.2.0) — leave blank to auto-bump'
        required: false
        type: string
      bump:
        description: 'Part to bump when no explicit version is given'
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  bump:
    name: Update Version and Tag
    runs-on: ubuntu-latest
    # Skip the version-bump commit itself to prevent an infinite loop.
    if: >
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore: bump version')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve new version
        id: version
        run: |
          git fetch --tags

          # --- Explicit version supplied via workflow_dispatch ---
          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="${{ inputs.version }}"
            if ! echo "$NEW_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format '$NEW_VERSION'. Expected X.Y.Z."
              exit 1
            fi
            echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using explicit version: $NEW_VERSION"
            exit 0
          fi

          # --- Auto-compute next version ---
          CURRENT=$(grep -Po '^\s*\*\s*Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' firefighter-stats.php)
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST="${LATEST_TAG#v}"
          [ -z "$LATEST" ] && LATEST="0.0.0"
          echo "Files: $CURRENT  |  Latest tag: v$LATEST"

          # Bump type: from input (workflow_dispatch) or commit-message keywords
          # Include [minor] or [major] in the commit message to bump those parts.
          # Default is patch.
          BUMP="${{ inputs.bump }}"
          if [ -z "$BUMP" ]; then
            MSG="${{ github.event.head_commit.message }}"
            if echo "$MSG" | grep -qi '\[major\]'; then BUMP=major
            elif echo "$MSG" | grep -qi '\[minor\]'; then BUMP=minor
            else BUMP=patch
            fi
          fi
          echo "Bump type: $BUMP"

          # Parse version triplets
          IFS='.' read -r C_MAJ C_MIN C_PAT <<< "$CURRENT"
          IFS='.' read -r L_MAJ L_MIN L_PAT <<< "$LATEST"

          # If the developer already bumped the files past the latest tag, honour it.
          if [ "$C_MAJ" -gt "$L_MAJ" ] || \
             { [ "$C_MAJ" -eq "$L_MAJ" ] && [ "$C_MIN" -gt "$L_MIN" ]; } || \
             { [ "$C_MAJ" -eq "$L_MAJ" ] && [ "$C_MIN" -eq "$L_MIN" ] && [ "$C_PAT" -gt "$L_PAT" ]; }; then
            NEW_VERSION="$CURRENT"
          else
            case "$BUMP" in
              major) NEW_VERSION="$((L_MAJ+1)).0.0" ;;
              minor) NEW_VERSION="${L_MAJ}.$((L_MIN+1)).0" ;;
              *)     NEW_VERSION="${L_MAJ}.${L_MIN}.$((L_PAT+1))" ;;
            esac
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved new version: $NEW_VERSION"

      - name: Check tag does not already exist
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.NEW_VERSION }}" | grep -q .; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${{ steps.version.outputs.NEW_VERSION }} already exists — nothing to do."
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in all files
        if: steps.check_tag.outputs.SKIP != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.NEW_VERSION }}"

          # 1. firefighter-stats.php — plugin header
          sed -i 's/^\([[:space:]]*\*[[:space:]]*Version:[[:space:]]*\)[0-9]\+\.[0-9]\+\.[0-9]\+/\1'"$NEW_VERSION"'/' firefighter-stats.php

          # 2. firefighter-stats.php — PHP constant
          sed -i "s/^\(define([[:space:]]*'FIREFIGHTER_STATS_VERSION'[[:space:]]*,[[:space:]]*'\)[0-9]\+\.[0-9]\+\.[0-9]\+/\1${NEW_VERSION}/" firefighter-stats.php

          # 3. readme.txt — Stable tag
          sed -i 's/^\(Stable tag:[[:space:]]*\)[0-9]\+\.[0-9]\+\.[0-9]\+/\1'"$NEW_VERSION"'/' readme.txt

          # 4. readme-pl_PL.txt — Stable tag
          sed -i 's/^\(Stable tag:[[:space:]]*\)[0-9]\+\.[0-9]\+\.[0-9]\+/\1'"$NEW_VERSION"'/' readme-pl_PL.txt

          # 5. blocks/emergency-list-widget/block.json — version field
          sed -i 's/^\([[:space:]]*"version":[[:space:]]*"\)[0-9]\+\.[0-9]\+\.[0-9]\+/\1'"$NEW_VERSION"'/' blocks/emergency-list-widget/block.json

      - name: Update CHANGELOG.md
        if: steps.check_tag.outputs.SKIP != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.NEW_VERSION }}"
          DATE=$(date -u '+%Y-%m-%d')

          # Previous release tag (the new tag has not been pushed yet).
          PREV_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)

          # Collect commit subjects since the previous tag, excluding automated bumps.
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"* %s" --no-merges \
                  | grep -v "^\* chore: bump version")
          else
            LOG=$(git log HEAD --pretty=format:"* %s" --no-merges \
                  | grep -v "^\* chore: bump version")
          fi

          [ -z "$LOG" ] && LOG="* Release ${NEW_VERSION}."

          echo "New changelog entry:"
          echo "## [${NEW_VERSION}] — ${DATE}"
          echo "$LOG"

          # Create CHANGELOG.md with header if it does not exist yet.
          if [ ! -f CHANGELOG.md ]; then
            printf '# Changelog\n' > CHANGELOG.md
          fi

          # Write entry to temp file (avoids multi-line variable quoting issues in awk).
          printf '## [%s] \xe2\x80\x94 %s\n\n%s\n' "$NEW_VERSION" "$DATE" "$LOG" > /tmp/cl_entry.txt

          # Prepend the new entry after the "# Changelog" header line.
          awk 'FNR==NR{e=e $0 "\n";next} /^# Changelog$/{print;print "";printf "%s\n",e;next} 1' \
            /tmp/cl_entry.txt CHANGELOG.md > /tmp/cl.tmp && mv /tmp/cl.tmp CHANGELOG.md

      - name: Verify updated versions
        if: steps.check_tag.outputs.SKIP != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.NEW_VERSION }}"

          HEADER_VERSION=$(grep -Po '^\s*\*\s*Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' firefighter-stats.php)
          CONST_VERSION=$(grep -Po "define\(\s*'FIREFIGHTER_STATS_VERSION'\s*,\s*'\K[0-9]+\.[0-9]+\.[0-9]+" firefighter-stats.php)
          STABLE_TAG=$(grep -Po '^Stable tag:\s*\K[0-9]+\.[0-9]+\.[0-9]+' readme.txt)
          STABLE_TAG_PL=$(grep -Po '^Stable tag:\s*\K[0-9]+\.[0-9]+\.[0-9]+' readme-pl_PL.txt)
          BLOCK_VERSION=$(grep -Po '"version"\s*:\s*"\K[0-9]+\.[0-9]+\.[0-9]+' blocks/emergency-list-widget/block.json)

          ERRORS=0
          for FILE_VERSION in \
            "firefighter-stats.php header:$HEADER_VERSION" \
            "firefighter-stats.php constant:$CONST_VERSION" \
            "readme.txt Stable tag:$STABLE_TAG" \
            "readme-pl_PL.txt Stable tag:$STABLE_TAG_PL" \
            "block.json version:$BLOCK_VERSION"; do
            LABEL="${FILE_VERSION%%:*}"
            VALUE="${FILE_VERSION##*:}"
            if [ "$VALUE" != "$NEW_VERSION" ]; then
              echo "::error::Version update failed — $LABEL is '$VALUE', expected '$NEW_VERSION'"
              ERRORS=1
            else
              echo "✓ $LABEL = $VALUE"
            fi
          done

          if [ "$ERRORS" -eq 1 ]; then exit 1; fi
          echo "All versions updated to $NEW_VERSION"

      - name: Commit and tag
        if: steps.check_tag.outputs.SKIP != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.NEW_VERSION }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add firefighter-stats.php readme.txt readme-pl_PL.txt blocks/emergency-list-widget/block.json CHANGELOG.md
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"

          git push origin HEAD
          git push origin "v${NEW_VERSION}"
